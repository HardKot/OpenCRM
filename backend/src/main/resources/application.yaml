app:
  email: ${FROM_EMAIL:app@localhost.ru}
  domain: ${DOMAIN:localhost}
  version: ${VERSION:1.0.0}

spring:
  application:
    name: open-crm

  datasource:
    driver-class-name: org.postgresql.Driver
    password: ${DB_PASSWORD}
    username: ${DB_USERNAME}
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:open-crm}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  mail:
    host: ${MAIL_HOST:localhost}
    port: ${MAIL_PORT:1025}

  data:
    rest:
      base-path: /api
      default-page-size: 20
      max-page-size: 100
  docker:
    compose:
      enabled: ${DOCKER_COMPOSE_ENABLED:true}
      file: docker-compose.debug.yml

springdoc:
  api-docs:
    path: /api-docs

logging:
  level:
    root: INFO
    com.open.crm: DEBUG
    org.flywaydb: DEBUG
    org.springframework.boot.autoconfigure.flyway: DEBUG
  file:
    name: logs/spring.log
  pattern:
    console: "%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n"

jwt:
  secret: ${JWT_SECRET}
  access-expires: 900000 # 15 minutes in milliseconds
  refresh-expires: 604800000 # 7 days in milliseconds
