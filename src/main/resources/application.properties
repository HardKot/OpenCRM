app.email=${FROM_EMAIL:app@localhost.ru}
app.domain=${DOMAIN:localhost}
app.version=${VERSION:1.0.0}

spring.application.name=open-crm

spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.password=${DB_PASSWORD:secret}
spring.datasource.username=${DB_USERNAME:myuser}
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:open-crm}

spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.flyway.enabled=true

spring.mail.host=${MAIL_HOST:localhost}
spring.mail.port=${MAIL_PORT:1025}

logging.level.root=INFO
logging.level.com.open.crm=DEBUG
logging.file.name=logs/spring.log
logging.pattern.console=%d{HH:mm:ss.SSS} %-5level %logger{36} - %msg%n